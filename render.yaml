services:
  # Backend
  - type: web
    name: auditagent-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: POLAR_ACCESS_TOKEN
        sync: false
      - key: POLAR_ORGANIZATION_ID
        sync: false
      - key: POLAR_SERVER
        value: production
      - key: POLAR_WEBHOOK_SECRET
        sync: false
      - key: POLAR_PRODUCT_STARTER_ID
        sync: false
      - key: POLAR_PRODUCT_GROWTH_ID
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

  # Frontend
  - type: web
    name: auditagent-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: auditagent-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
